<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hub SE Agent</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --accent: #0078D4;
    --accent-light: #E8F4FD;
    --bg: #F5F5F5;
    --card-bg: #FFFFFF;
    --text: #1A1A1A;
    --text-secondary: #666;
    --border: #E0E0E0;
    --user-bubble: #0078D4;
    --agent-bubble: #FFFFFF;
    --success: #107C10;
    --error: #D13438;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  .header {
    background: var(--card-bg);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    -webkit-app-region: drag;
  }
  .header-icon {
    width: 32px; height: 32px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .header-icon img { width: 100%; height: 100%; object-fit: cover; }
  .header-text { flex: 1; }
  .header-text h1 { font-size: 14px; font-weight: 600; }
  .new-chat-btn {
    background: none; border: 1px solid var(--border); border-radius: 6px;
    padding: 4px 10px; font-size: 11px; color: var(--text-secondary);
    cursor: pointer; -webkit-app-region: no-drag;
    transition: all 0.15s;
  }
  .new-chat-btn:hover { border-color: var(--accent); color: var(--accent); }
  .header-text .status {
    font-size: 11px; color: var(--text-secondary);
  }
  .status-dot {
    display: inline-block; width: 6px; height: 6px;
    border-radius: 50%; margin-right: 4px;
    background: var(--text-secondary);
    vertical-align: middle;
  }
  .status-dot.connected { background: var(--success); }
  .status-dot.working { background: #FF8C00; animation: pulse 1s infinite; }
  .status-dot.error { background: var(--error); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Chat area */
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .message {
    max-width: 85%;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { align-self: flex-end; }
  .message.agent { align-self: flex-start; }

  .bubble {
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.5;
    word-wrap: break-word;
    white-space: pre-wrap;
  }
  .message.user .bubble {
    background: var(--user-bubble);
    color: white;
    border-bottom-right-radius: 4px;
  }
  .message.user .bubble.remote {
    background: #7C3AED;
  }
  .remote-label {
    font-size: 10px; color: #7C3AED; font-weight: 600;
    text-align: right; padding: 0 4px 2px 0;
  }
  .message.agent .bubble {
    background: var(--agent-bubble);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .msg-time {
    font-size: 10px; color: var(--text-secondary);
    margin-top: 3px; padding: 0 4px;
  }
  .message.user .msg-time { text-align: right; }

  /* Progress steps inside agent bubble */
  .progress-step {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 4px 0; font-size: 12px;
  }
  .progress-step .step-icon {
    flex-shrink: 0; width: 18px; height: 18px;
    border-radius: 50%; display: flex;
    align-items: center; justify-content: center;
    font-size: 10px; margin-top: 1px;
  }
  .step-icon.working {
    background: #FFF4CE; color: #FF8C00;
    animation: pulse 1s infinite;
  }
  .step-icon.done { background: #DFF6DD; color: var(--success); }
  .step-icon.error { background: #FDE7E9; color: var(--error); }

  /* Agent badge */
  .agent-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 12px;
    font-size: 11px; font-weight: 600;
    margin: 4px 0 6px 0;
  }
  .agent-badge .agent-icon {
    font-size: 12px;
  }
  .agent-badge.qa {
    background: #E8F4FD; color: #0078D4;
  }
  .agent-badge.meeting {
    background: #DFF6DD; color: #107C10;
  }
  .agent-badge.general {
    background: #F3F2F1; color: #666;
  }

  /* Input area */
  .input-area {
    background: var(--card-bg);
    border-top: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  .input-area textarea {
    flex: 1; resize: none; border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 14px;
    font-family: inherit; font-size: 13px;
    outline: none; max-height: 100px; min-height: 40px;
    transition: border-color 0.15s;
  }
  .input-area textarea:focus { border-color: var(--accent); }
  .input-area textarea::placeholder { color: #999; }

  .send-btn {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--accent); border: none;
    color: white; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: #106EBE; }
  .send-btn:disabled { background: #CCC; cursor: not-allowed; }
  .send-btn svg { width: 18px; height: 18px; }

  /* Welcome state */
  .welcome {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--text-secondary); text-align: center;
    padding: 40px;
  }
  .welcome-icon {
    width: 56px; height: 56px; border-radius: 16px;
    background: var(--accent-light); color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; font-weight: 700; margin-bottom: 16px;
  }
  .welcome h2 { font-size: 16px; color: var(--text); margin-bottom: 6px; }
  .welcome p { font-size: 13px; max-width: 300px; line-height: 1.5; }

  /* Markdown content styling */
  .bubble .md-content { white-space: normal; }
  .bubble .md-content p { margin: 0 0 8px 0; }
  .bubble .md-content p:last-child { margin-bottom: 0; }
  .bubble .md-content strong { font-weight: 600; }
  .bubble .md-content em { font-style: italic; }
  .bubble .md-content code {
    background: #f0f0f0; padding: 1px 5px; border-radius: 3px;
    font-family: 'Cascadia Code', 'Consolas', monospace; font-size: 12px;
  }
  .bubble .md-content pre {
    background: #f0f0f0; padding: 8px 10px; border-radius: 6px;
    overflow-x: auto; margin: 6px 0; font-size: 12px;
  }
  .bubble .md-content pre code { background: none; padding: 0; }
  .bubble .md-content table {
    border-collapse: collapse; width: 100%; margin: 6px 0; font-size: 12px;
  }
  .bubble .md-content th, .bubble .md-content td {
    border: 1px solid var(--border); padding: 5px 8px; text-align: left;
  }
  .bubble .md-content th {
    background: #f5f5f5; font-weight: 600;
  }
  .bubble .md-content ul, .bubble .md-content ol {
    margin: 4px 0; padding-left: 20px;
  }
  .bubble .md-content li { margin: 2px 0; }
  .bubble .md-content blockquote {
    border-left: 3px solid var(--accent); margin: 6px 0;
    padding: 4px 10px; color: var(--text-secondary);
  }
  .bubble .md-content h1, .bubble .md-content h2, .bubble .md-content h3 {
    margin: 8px 0 4px 0; font-weight: 600;
  }
  .bubble .md-content h1 { font-size: 16px; }
  .bubble .md-content h2 { font-size: 14px; }
  .bubble .md-content h3 { font-size: 13px; }

  /* Scrollbar */
  .chat::-webkit-scrollbar { width: 6px; }
  .chat::-webkit-scrollbar-track { background: transparent; }
  .chat::-webkit-scrollbar-thumb { background: #CCC; border-radius: 3px; }
  .chat::-webkit-scrollbar-thumb:hover { background: #AAA; }

  /* Sign-in banner */
  .banner {
    background: #FFF4CE; border-bottom: 1px solid #FFE4A0;
    padding: 8px 20px; font-size: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .banner button {
    background: var(--accent); color: white; border: none;
    border-radius: 4px; padding: 3px 10px; font-size: 11px;
    cursor: pointer;
  }
  .banner.hidden { display: none; }

  /* Skills panel */
  .skills-bar {
    background: var(--card-bg);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .skills-toggle {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 20px; cursor: pointer;
    color: var(--text-secondary);
    user-select: none;
    transition: color 0.15s;
  }
  .skills-toggle:hover { color: var(--accent); }
  .skills-toggle .chevron {
    font-size: 10px; transition: transform 0.2s;
    display: inline-block;
  }
  .skills-toggle .chevron.open { transform: rotate(90deg); }
  .skills-toggle .skill-count {
    background: var(--accent-light); color: var(--accent);
    border-radius: 8px; padding: 0 6px;
    font-size: 10px; font-weight: 600;
    min-width: 18px; text-align: center;
  }
  .skills-list {
    max-height: 0; overflow: hidden;
    transition: max-height 0.25s ease;
    padding: 0 20px;
  }
  .skills-list.open {
    max-height: 300px;
    padding: 0 20px 8px 20px;
  }
  .skill-item {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 0;
    border-bottom: 1px solid #f0f0f0;
  }
  .skill-item:last-child { border-bottom: none; }
  .skill-check {
    width: 16px; height: 16px; border-radius: 3px;
    background: var(--success); color: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; flex-shrink: 0;
  }
  .skill-name {
    font-weight: 600; color: var(--text);
  }
  .skill-model {
    font-size: 10px; padding: 1px 5px; border-radius: 4px;
    flex-shrink: 0;
  }
  .skill-model.full { background: #FFF4CE; color: #996B00; }
  .skill-model.mini { background: #E8F4FD; color: #0078D4; }
  .skill-desc {
    color: var(--text-secondary); font-size: 11px;
    margin-left: 24px; padding-bottom: 2px;
  }

  /* Settings button */
  .settings-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text-secondary); font-size: 18px;
    padding: 4px 6px; border-radius: 6px;
    -webkit-app-region: no-drag;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .settings-btn:hover { color: var(--accent); background: var(--accent-light); }

  /* Settings modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.4); z-index: 100;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card-bg); border-radius: 12px;
    width: 520px; max-width: 95vw; max-height: 85vh;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; border-bottom: 1px solid var(--border);
  }
  .modal-header h2 { font-size: 15px; font-weight: 600; margin: 0; }
  .modal-close {
    background: none; border: none; font-size: 18px;
    cursor: pointer; color: var(--text-secondary);
    padding: 2px 6px; border-radius: 4px;
  }
  .modal-close:hover { background: #f0f0f0; }
  .modal-body {
    flex: 1; overflow-y: auto; padding: 16px 20px;
  }
  .modal-footer {
    padding: 12px 20px; border-top: 1px solid var(--border);
    display: flex; gap: 8px; justify-content: flex-end;
  }
  .modal-footer button {
    padding: 6px 16px; border-radius: 6px; font-size: 12px;
    cursor: pointer; border: 1px solid var(--border);
    background: var(--card-bg); color: var(--text);
  }
  .modal-footer button.primary {
    background: var(--accent); color: white; border-color: var(--accent);
  }
  .modal-footer button.primary:hover { background: #106EBE; }
  .modal-footer .save-status {
    font-size: 11px; color: var(--success); align-self: center;
    margin-right: auto;
  }

  /* Config form */
  .config-section { margin-bottom: 16px; }
  .config-section label {
    display: block; font-size: 12px; font-weight: 600;
    margin-bottom: 4px; color: var(--text);
  }
  .config-section input[type="text"],
  .config-section input[type="time"] {
    width: 100%; padding: 7px 10px; border: 1px solid var(--border);
    border-radius: 6px; font-size: 13px; font-family: inherit;
    outline: none;
  }
  .config-section input:focus { border-color: var(--accent); }

  .speaker-table {
    width: 100%; border-collapse: collapse; font-size: 12px;
    margin-top: 4px;
  }
  .speaker-table th {
    text-align: left; padding: 6px 8px; background: #f5f5f5;
    font-weight: 600; border-bottom: 1px solid var(--border);
  }
  .speaker-table td {
    padding: 4px 8px; border-bottom: 1px solid #f0f0f0;
    vertical-align: middle;
  }
  .speaker-table input {
    width: 100%; padding: 4px 6px; border: 1px solid var(--border);
    border-radius: 4px; font-size: 12px; font-family: inherit;
    outline: none; background: transparent;
  }
  .speaker-table input:focus { border-color: var(--accent); background: white; }
  .speaker-table .row-actions {
    width: 30px; text-align: center;
  }
  .speaker-table .remove-row {
    background: none; border: none; color: var(--error);
    cursor: pointer; font-size: 14px; padding: 2px 4px;
    border-radius: 4px;
  }
  .speaker-table .remove-row:hover { background: #FDE7E9; }
  .add-row-btn {
    background: none; border: 1px dashed var(--border);
    border-radius: 6px; padding: 4px 12px; font-size: 11px;
    color: var(--text-secondary); cursor: pointer;
    margin-top: 6px; transition: all 0.15s;
  }
  .add-row-btn:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>

      <div class="config-section">
        <label>Innovation Hub Name</label>
        <input type="text" id="cfgHubName" placeholder="e.g. Innovation Hub India">
      </div>
      <div class="config-section">
        <label>Default Session Start Time</label>
        <input type="time" id="cfgStartTime" value="09:00">
      </div>
      <div class="config-section">
        <label>Speakers by Topic</label>
        <table class="speaker-table" id="speakerTable">
          <thead><tr><th>Topic</th><th>Speaker 1</th><th>Speaker 2</th><th class="row-actions"></th></tr></thead>
          <tbody id="speakerBody"></tbody>
        </table>
        <button class="add-row-btn" onclick="addSpeakerRow()">+ Add topic</button>
      </div>
    </div>
    <div class="modal-footer">
      <span class="save-status" id="saveStatus"></span>
      <button onclick="closeSettings()">Cancel</button>
      <button class="primary" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>

<script>
  const chat = document.getElementById('chat');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const welcome = document.getElementById('welcome');
  const authBanner = document.getElementById('authBanner');

  let ws = null;
  let activeBubbles = new Map();  // request_id → agent bubble element
  let lastBubble = null;          // fallback for legacy messages without request_id
  let reconnectTimer = null;

  // ---- WebSocket connection ----
  function connect() {
    ws = new WebSocket('ws://127.0.0.1:18080');

    ws.onopen = () => {
      setStatus('connected', 'Ready');
      if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
    };

    ws.onclose = () => {
      setStatus('error', 'Disconnected — retrying...');
      reconnectTimer = setTimeout(connect, 3000);
    };

    ws.onerror = () => {};

    ws.onmessage = (event) => {
      const msg = JSON.parse(event.data);
      handleServerMessage(msg);
    };
  }

  function getBubble(requestId) {
    // When a request_id is present, ONLY match its own registered bubble.
    // Never fall back to a stale lastBubble from a previous completed task.
    if (requestId) return activeBubbles.get(requestId) || null;
    // Legacy messages without request_id use lastBubble as fallback.
    return lastBubble;
  }

  function setBubble(requestId, el) {
    if (requestId) activeBubbles.set(requestId, el);
    lastBubble = el;
  }

  function removeBubble(requestId) {
    if (requestId) {
      const el = activeBubbles.get(requestId);
      activeBubbles.delete(requestId);
      if (lastBubble === el) lastBubble = null;
    }
  }

  function handleServerMessage(msg) {
    const rid = msg.request_id || msg.task_id || null;

    switch (msg.type) {
      case 'auth_status':
        if (msg.ok) {
          setStatus('connected', `Ready — ${msg.user || 'Authenticated'}`);
          authBanner.classList.add('hidden');
        } else {
          setStatus('error', 'Not signed in');
          authBanner.classList.remove('hidden');
        }
        break;

      case 'task_queued': {
        // Close any working step on a previous bubble for this rid
        const prevBub = getBubble(rid);
        if (prevBub) markLastStepDone(prevBub);
        const qBubble = addAgentMessage('');
        setBubble(rid, qBubble);
        addStep(qBubble, 'done',
          `Your request has been queued (position ${msg.position}). I'll get to it shortly.`);
        // Don't remove — the task_started for this same rid will reuse it later
        break;
      }

      case 'task_started': {
        setStatus('working', 'Working...');
        // If there's already a bubble for this request (from task_queued), reuse it
        let bubble = getBubble(rid);
        if (!bubble) {
          bubble = addAgentMessage('');
          setBubble(rid, bubble);
        }
        if (msg.source === 'queued') {
          addStep(bubble, 'working', 'Processing queued request...');
        } else if (msg.source === 'remote' || msg.source === 'teams') {
          addStep(bubble, 'working', 'Processing remote request...');
        } else {
          addStep(bubble, 'working', 'Starting...');
        }
        break;
      }

      case 'progress': {
        setStatus('working', 'Working...');
        let bubble = getBubble(rid);
        if (!bubble) {
          bubble = addAgentMessage('');
          setBubble(rid, bubble);
        }
        markLastStepDone(bubble);
        if (msg.kind === 'agent') {
          addAgentBadge(bubble, msg.message);
        } else if (msg.kind === 'progress') {
          addProgressBlock(bubble, msg.message);
        } else {
          addStep(bubble, 'working', msg.message);
        }
        break;
      }

      case 'task_complete': {
        // Only show "Done" status if no other tasks are active
        const remaining = activeBubbles.size - 1;  // minus the one completing
        if (remaining <= 0) setStatus('connected', 'Done');
        const bubble = getBubble(rid);
        if (bubble) {
          markLastStepDone(bubble);
          const resultDiv = document.createElement('div');
          resultDiv.className = 'md-content';
          resultDiv.style.cssText = 'margin-top:8px;padding-top:8px;border-top:1px solid #eee;';
          resultDiv.innerHTML = renderMarkdown(msg.result);
          bubble.querySelector('.bubble').appendChild(resultDiv);
          scrollToBottom();
        }
        removeBubble(rid);
        break;
      }

      case 'task_error': {
        const remaining = activeBubbles.size - 1;
        if (remaining <= 0) setStatus('error', 'Error');
        let bubble = getBubble(rid);
        if (bubble) {
          markLastStepDone(bubble, true);
          addStep(bubble, 'error', `Error: ${msg.error}`);
        } else {
          // No bubble found — create one for the error
          bubble = addAgentMessage('');
          addStep(bubble, 'error', `Error: ${msg.error}`);
        }
        removeBubble(rid);
        // Show sign-in banner if error is auth-related
        if (msg.error && (msg.error.includes('authentication') || msg.error.includes('sign in') || msg.error.includes('Azure CLI') || msg.error.includes('az login'))) {
          authBanner.classList.remove('hidden');
        }
        break;
      }

      case 'signin_status':
        if (msg.ok) {
          setStatus('connected', `Signed in — ${msg.message}`);
          authBanner.classList.add('hidden');
        } else {
          setStatus('error', `Sign-in failed`);
        }
        break;

      case 'history_cleared':
        setStatus('connected', 'New conversation');
        break;

      case 'remote_message':
        welcome.style.display = 'none';
        addRemoteUserMessage(msg.sender || 'Remote', msg.text || '');
        break;

      case 'skills_list':
        renderSkillsPanel(msg.skills || []);
        break;

      case 'config_data':
        populateSettings(msg.config || {});
        break;

      case 'config_saved':
        if (msg.ok) {
          document.getElementById('saveStatus').textContent = '✓ Saved';
          setTimeout(() => { document.getElementById('saveStatus').textContent = ''; }, 2000);
        } else {
          document.getElementById('saveStatus').textContent = 'Save failed';
          document.getElementById('saveStatus').style.color = 'var(--error)';
        }
        break;
    }
  }

  // ---- UI helpers ----
  function setStatus(state, text) {
    statusDot.className = 'status-dot ' + state;
    statusText.textContent = text;
  }

  function now() {
    return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  }

  function addUserMessage(text) {
    welcome.style.display = 'none';
    const div = document.createElement('div');
    div.className = 'message user';
    div.innerHTML = `<div class="bubble">${escapeHtml(text)}</div><div class="msg-time">${now()}</div>`;
    chat.appendChild(div);
    scrollToBottom();
  }

  function addRemoteUserMessage(sender, text) {
    const div = document.createElement('div');
    div.className = 'message user';
    const label = sender === 'test-client' ? 'Test Client' : sender;
    div.innerHTML = `<div class="remote-label">📡 ${escapeHtml(label)}</div><div class="bubble remote">${escapeHtml(text)}</div><div class="msg-time">${now()}</div>`;
    chat.appendChild(div);
    scrollToBottom();
  }

  function addAgentMessage(text) {
    const div = document.createElement('div');
    div.className = 'message agent';
    div.innerHTML = `<div class="bubble">${escapeHtml(text)}</div><div class="msg-time">${now()}</div>`;
    chat.appendChild(div);
    scrollToBottom();
    return div;
  }

  function addAgentBadge(msgDiv, agentName) {
    const bubble = msgDiv.querySelector('.bubble');
    const badge = document.createElement('div');
    let cssClass = 'general';
    let icon = '🤖';
    if (agentName.toLowerCase().includes('q&a')) {
      cssClass = 'qa'; icon = '🔍';
    } else if (agentName.toLowerCase().includes('meeting')) {
      cssClass = 'meeting'; icon = '📅';
    }
    badge.className = `agent-badge ${cssClass}`;
    badge.innerHTML = `<span class="agent-icon">${icon}</span>${escapeHtml(agentName)}`;
    bubble.appendChild(badge);
    scrollToBottom();
  }

  function addStep(msgDiv, state, text) {
    const bubble = msgDiv.querySelector('.bubble');
    const step = document.createElement('div');
    step.className = 'progress-step';
    const icon = state === 'working' ? '⏳' : state === 'done' ? '✓' : '✕';
    step.innerHTML = `<span class="step-icon ${state}">${icon}</span><span>${escapeHtml(text)}</span>`;
    bubble.appendChild(step);
    scrollToBottom();
  }

  function addProgressBlock(msgDiv, text) {
    const bubble = msgDiv.querySelector('.bubble');
    const block = document.createElement('div');
    block.className = 'md-content';
    block.style.cssText = 'margin-top:8px;padding-top:8px;border-top:1px solid #eee;';
    block.innerHTML = renderMarkdown(text);
    bubble.appendChild(block);
    scrollToBottom();
  }

  function markLastStepDone(msgDiv, isError) {
    const steps = msgDiv.querySelectorAll('.progress-step');
    if (steps.length > 0) {
      const last = steps[steps.length - 1];
      const icon = last.querySelector('.step-icon');
      if (icon.classList.contains('working')) {
        icon.classList.remove('working');
        icon.classList.add(isError ? 'error' : 'done');
        icon.textContent = isError ? '✕' : '✓';
      }
    }
  }

  function scrollToBottom() {
    requestAnimationFrame(() => { chat.scrollTop = chat.scrollHeight; });
  }

  function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // ---- Input handling ----
  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
    // Auto-grow textarea
    requestAnimationFrame(() => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 100) + 'px';
    });
  }

  function sendMessage() {
    const text = input.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    addUserMessage(text);
    ws.send(JSON.stringify({ type: 'task', input: text }));
    input.value = '';
    input.style.height = 'auto';
  }

  function newConversation() {
    // Remove all messages, restore welcome
    chat.querySelectorAll('.message').forEach(m => m.remove());
    welcome.style.display = '';
    activeBubbles.clear();
    lastBubble = null;
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'clear_history' }));
    }
  }

  function signIn() {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'signin' }));
      setStatus('working', 'Signing in...');
    }
  }

  // ---- Skills panel ----
  function renderSkillsPanel(skills) {
    const bar = document.getElementById('skillsBar');
    const list = document.getElementById('skillsList');
    const count = document.getElementById('skillCount');
    if (!skills.length) { bar.style.display = 'none'; return; }
    bar.style.display = '';
    count.textContent = skills.length;
    list.innerHTML = skills.map(s => {
      const modelLabel = s.model === 'full' ? 'LLM' : 'Mini';
      const modelClass = s.model === 'full' ? 'full' : 'mini';
      const displayName = s.name.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
      return `<div><div class="skill-item">
        <span class="skill-check">✓</span>
        <span class="skill-name">${escapeHtml(displayName)}</span>
        <span class="skill-model ${modelClass}">${modelLabel}</span>
      </div>
      <div class="skill-desc">${escapeHtml(s.description)}</div></div>`;
    }).join('');
  }

  function toggleSkills() {
    const list = document.getElementById('skillsList');
    const chevron = document.getElementById('skillsChevron');
    list.classList.toggle('open');
    chevron.classList.toggle('open');
  }

  // ---- Markdown rendering ----
  function renderMarkdown(text) {
    if (typeof marked !== 'undefined') {
      try { return marked.parse(text); } catch(e) { /* fall through */ }
    }
    return escapeHtml(text).replace(/\n/g, '<br>');
  }

  // ---- Settings ----
  function openSettings() {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'get_config' }));
    }
    document.getElementById('settingsModal').classList.add('open');
    document.getElementById('saveStatus').textContent = '';
  }

  function closeSettings() {
    document.getElementById('settingsModal').classList.remove('open');
  }

  function populateSettings(config) {
    document.getElementById('cfgHubName').value = config.hub_name || '';
    // Parse "09:00 AM" → "09:00" for the time input
    const raw = config.default_session_start_time || '09:00 AM';
    const m = raw.match(/(\d{1,2}):(\d{2})\s*(AM|PM)?/i);
    if (m) {
      let h = parseInt(m[1], 10);
      if (m[3] && m[3].toUpperCase() === 'PM' && h < 12) h += 12;
      if (m[3] && m[3].toUpperCase() === 'AM' && h === 12) h = 0;
      document.getElementById('cfgStartTime').value =
        String(h).padStart(2, '0') + ':' + m[2];
    }
    // Speakers
    const body = document.getElementById('speakerBody');
    body.innerHTML = '';
    (config.speakers_by_topic || []).forEach(item => {
      addSpeakerRow(item.topic, item.speakers?.[0] || '', item.speakers?.[1] || '');
    });
  }

  function addSpeakerRow(topic, s1, s2) {
    const body = document.getElementById('speakerBody');
    const tr = document.createElement('tr');
    tr.innerHTML =
      `<td><input type="text" value="${escapeAttr(topic || '')}" placeholder="Topic name"></td>` +
      `<td><input type="text" value="${escapeAttr(s1 || '')}" placeholder="Speaker 1"></td>` +
      `<td><input type="text" value="${escapeAttr(s2 || '')}" placeholder="Speaker 2 (optional)"></td>` +
      `<td class="row-actions"><button class="remove-row" onclick="this.closest('tr').remove()" title="Remove">✕</button></td>`;
    body.appendChild(tr);
  }

  function escapeAttr(s) {
    return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function collectSettings() {
    const timeVal = document.getElementById('cfgStartTime').value; // "HH:MM"
    const parts = timeVal.split(':');
    let h = parseInt(parts[0], 10);
    const mm = parts[1];
    const ampm = h >= 12 ? 'PM' : 'AM';
    if (h > 12) h -= 12;
    if (h === 0) h = 12;
    const startTime = String(h).padStart(2, '0') + ':' + mm + ' ' + ampm;

    const rows = document.querySelectorAll('#speakerBody tr');
    const speakers = [];
    rows.forEach(tr => {
      const inputs = tr.querySelectorAll('input');
      const topic = inputs[0].value.trim();
      if (!topic) return;
      const spkrs = [inputs[1].value.trim(), inputs[2].value.trim()].filter(Boolean);
      speakers.push({ topic, speakers: spkrs });
    });

    return {
      hub_name: document.getElementById('cfgHubName').value.trim(),
      default_session_start_time: startTime,
      speakers_by_topic: speakers,
    };
  }

  function saveSettings() {
    const config = collectSettings();
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'save_config', config }));
    }
  }

  // ---- Start ----
  connect();
  input.focus();
</script>
</body>
</html>
